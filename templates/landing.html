<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>PFC Operating System</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#E55B2D;
  --orange2:#f07040;
  --red:#C0272D;
  --red2:#d93030;
  --navy:#1B2D5B;
  --navy2:#243a72;
  --navy3:#0f1e3d;
  --gray:#6B7280;
  --white:#ffffff;
  --r12:12px;
  --r8:8px;
  --shadow-lg:0 20px 60px rgba(0,0,0,.35);
}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--navy3);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:32px 24px;
  position:relative;
  overflow:hidden;
}

/* ── Background layers ─────────────────────────────────────── */
.bg-glow{
  position:fixed;pointer-events:none;
  border-radius:50%;filter:blur(80px);opacity:.18;
}
.bg-glow-1{
  width:700px;height:700px;
  background:var(--orange);
  top:-200px;right:-200px;
}
.bg-glow-2{
  width:600px;height:600px;
  background:var(--red);
  bottom:-250px;left:-200px;
}
.bg-glow-3{
  width:400px;height:400px;
  background:var(--navy2);
  top:40%;left:40%;
  opacity:.25;
}
/* Subtle grid overlay */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
}

/* ── Brand section ─────────────────────────────────────────── */
.brand{
  text-align:center;
  margin-bottom:52px;
  position:relative;z-index:1;
}
.brand-sub{
  font-size:11px;font-weight:500;
  color:rgba(255,255,255,.35);
  letter-spacing:3px;text-transform:uppercase;
  margin-top:10px;
}

/* ── Department tiles ──────────────────────────────────────── */
.tiles{
  display:flex;gap:22px;
  position:relative;z-index:1;
  flex-wrap:wrap;justify-content:center;
}
.tile{
  background:rgba(255,255,255,.055);
  border:1.5px solid rgba(255,255,255,.09);
  border-radius:22px;
  padding:38px 42px;
  width:290px;
  cursor:pointer;
  transition:all .22s ease;
  text-align:center;
  backdrop-filter:blur(12px);
  position:relative;
  overflow:hidden;
}
.tile::before{
  content:'';
  position:absolute;inset:0;
  border-radius:22px;
  opacity:0;
  transition:opacity .22s;
}
.tile-routing::before{background:linear-gradient(135deg,rgba(229,91,45,.12),rgba(192,39,45,.08));}
.tile-onboarding::before{background:linear-gradient(135deg,rgba(27,45,91,.3),rgba(36,58,114,.2));}

.tile:hover{
  border-color:rgba(255,255,255,.2);
  transform:translateY(-5px);
  box-shadow:0 24px 56px rgba(0,0,0,.35);
}
.tile:hover::before{opacity:1;}

/* Accent bar at top of tile */
.tile-accent{
  position:absolute;top:0;left:0;right:0;
  height:3px;border-radius:22px 22px 0 0;
  opacity:0;transition:opacity .22s;
}
.tile:hover .tile-accent{opacity:1;}
.tile-routing .tile-accent{background:linear-gradient(90deg,var(--orange),var(--red));}
.tile-onboarding .tile-accent{background:linear-gradient(90deg,var(--navy2),var(--orange));}

.tile-icon-wrap{
  width:64px;height:64px;
  border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;
  font-size:26px;
  position:relative;
}
.tile-routing .tile-icon-wrap{
  background:linear-gradient(135deg,rgba(229,91,45,.25),rgba(192,39,45,.2));
  border:1px solid rgba(229,91,45,.3);
}
.tile-onboarding .tile-icon-wrap{
  background:linear-gradient(135deg,rgba(27,45,91,.5),rgba(36,58,114,.4));
  border:1px solid rgba(100,130,210,.25);
}
.tile-title{
  font-size:17px;font-weight:700;color:#fff;
  margin-bottom:8px;letter-spacing:-.2px;
}
.tile-desc{
  font-size:11.5px;color:rgba(255,255,255,.42);
  line-height:1.6;
}
.tile-btn{
  margin-top:22px;
  display:inline-flex;align-items:center;gap:6px;
  border-radius:10px;
  padding:9px 20px;
  font-size:12px;font-weight:600;
  font-family:'Inter',sans-serif;
  transition:all .18s;
  border:none;cursor:pointer;
}
.tile-routing .tile-btn{
  background:linear-gradient(135deg,var(--orange),var(--red));
  color:#fff;
  box-shadow:0 4px 16px rgba(229,91,45,.3);
}
.tile-routing:hover .tile-btn{
  box-shadow:0 6px 20px rgba(229,91,45,.45);
  transform:translateY(-1px);
}
.tile-onboarding .tile-btn{
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.8);
}
.tile-onboarding:hover .tile-btn{
  background:rgba(255,255,255,.18);
  color:#fff;
}

/* ── Login modal ───────────────────────────────────────────── */
.overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(6px);
  z-index:100;
  align-items:center;justify-content:center;
}
.overlay.show{display:flex}
.modal{
  background:#fff;
  border-radius:22px;
  padding:38px;
  width:100%;max-width:390px;
  box-shadow:var(--shadow-lg);
  position:relative;
  animation:slideUp .22s ease;
}
@keyframes slideUp{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}
.modal-back{
  position:absolute;top:18px;left:18px;
  background:none;border:none;
  font-size:12px;color:var(--gray);
  cursor:pointer;padding:5px 9px;border-radius:7px;
  font-family:'Inter',sans-serif;font-weight:500;
  display:flex;align-items:center;gap:4px;
  transition:background .15s;
}
.modal-back:hover{background:#f1f5f9}

/* Mini logo in modal header */
.modal-brand{
  display:flex;align-items:center;gap:10px;
  margin-bottom:22px;padding-top:6px;
}
.modal-logo-mini{flex-shrink:0;}
.modal-dept-title{
  font-size:16px;font-weight:800;color:var(--navy3);
  letter-spacing:-.3px;
}
.modal-dept-sub{font-size:11px;color:var(--gray);margin-top:2px;font-weight:500;}

.field-label{
  font-size:11.5px;font-weight:600;color:var(--gray);
  margin-bottom:6px;display:block;letter-spacing:.2px;text-transform:uppercase;
}
.field-input{
  width:100%;
  padding:11px 14px;
  border:1.5px solid #e2e8f0;
  border-radius:var(--r8);
  font-size:14px;font-family:'Inter',sans-serif;
  color:#1e293b;
  transition:border-color .15s,box-shadow .15s;
  outline:none;
  margin-bottom:14px;
}
.field-input:focus{
  border-color:var(--orange);
  box-shadow:0 0 0 3px rgba(229,91,45,.1);
}
.login-btn{
  width:100%;padding:12px;
  background:linear-gradient(135deg,var(--orange),var(--red));
  border:none;border-radius:var(--r8);
  color:#fff;font-size:14px;font-weight:700;
  font-family:'Inter',sans-serif;
  cursor:pointer;
  transition:all .15s;
  letter-spacing:.2px;
  box-shadow:0 4px 16px rgba(229,91,45,.3);
  margin-top:4px;
}
.login-btn:hover{
  box-shadow:0 6px 20px rgba(229,91,45,.45);
  transform:translateY(-1px);
}
.login-btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.login-error{
  display:none;
  background:#fef2f2;border:1px solid #fecaca;
  border-radius:var(--r8);padding:9px 12px;
  font-size:12px;color:#dc2626;margin-top:12px;
  line-height:1.5;
}
.login-error.show{display:block}

/* ── Footer ────────────────────────────────────────────────── */
.footer{
  position:fixed;bottom:20px;
  font-size:11px;color:rgba(255,255,255,.2);
  z-index:1;letter-spacing:.5px;
}
</style>
</head>
<body>

<!-- Background glows -->
<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>
<div class="bg-glow bg-glow-3"></div>

<!-- Brand -->
<div class="brand">
  <!-- Real PFC logo (transparent PNG) -->
  <img src="/static/pfc-logo.png" alt="Premier Food Choice"
       style="display:block;margin:0 auto 8px;height:120px;width:auto;"/>
  <div class="brand-sub" style="font-size:14px;letter-spacing:4px;">Operating System</div>
</div>

<!-- Department tiles -->
<div class="tiles">
  <div class="tile tile-routing" onclick="openLogin('routing')">
    <div class="tile-accent"></div>
    <div class="tile-icon-wrap">🚚</div>
    <div class="tile-title">Route Planning</div>
    <div class="tile-desc">Operations team<br>Planners &amp; Logistics Tower</div>
    <div class="tile-btn">Sign In &rarr;</div>
  </div>
  <div class="tile tile-onboarding" onclick="openLogin('onboarding')">
    <div class="tile-accent"></div>
    <div class="tile-icon-wrap">📋</div>
    <div class="tile-title">Client Onboarding</div>
    <div class="tile-desc">Sales &middot; Accounting<br>Supervisors</div>
    <div class="tile-btn">Sign In &rarr;</div>
  </div>
</div>

<div class="footer">Premier Food Choice &copy; 2026 &nbsp;&nbsp;|&nbsp;&nbsp; All rights reserved</div>

<!-- Login Modal -->
<div class="overlay" id="login-overlay">
  <div class="modal">
    <button class="modal-back" onclick="closeLogin()">&#8592; Back</button>
    <div class="modal-brand">
      <img src="/static/pfc-logo.png" alt="PFC" style="height:32px;width:auto;"/>
      <div>
        <div class="modal-dept-title" id="modal-title">Route Planning</div>
        <div class="modal-dept-sub" id="modal-sub">Planners &amp; Logistics Tower</div>
      </div>
    </div>

    <label class="field-label">Username</label>
    <input class="field-input" type="text" id="login-username"
           placeholder="Enter your username"
           onkeydown="if(event.key==='Enter')document.getElementById('login-password').focus()"/>

    <label class="field-label">Password</label>
    <input class="field-input" type="password" id="login-password"
           placeholder="Enter your password"
           onkeydown="if(event.key==='Enter')doLogin()"/>

    <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In &rarr;</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<script>
var _dept = 'routing';

var DEPT_META = {
  routing:    { title:'Route Planning',    sub:'Planners & Logistics Tower',      roles:['planner','tower'],                 dest:'/routing' },
  onboarding: { title:'Client Onboarding', sub:'Sales · Accounting · Supervisors', roles:['sales','accounting','supervisor'], dest:'/onboarding' }
};

function openLogin(dept) {
  _dept = dept;
  var m = DEPT_META[dept];
  document.getElementById('modal-title').textContent = m.title;
  document.getElementById('modal-sub').textContent   = m.sub;
  document.getElementById('login-username').value = '';
  document.getElementById('login-password').value = '';
  document.getElementById('login-error').className = 'login-error';
  document.getElementById('login-btn').disabled = false;
  document.getElementById('login-btn').textContent = 'Sign In →';
  document.getElementById('login-overlay').className = 'overlay show';
  setTimeout(function(){ document.getElementById('login-username').focus(); }, 80);
}

function closeLogin() {
  document.getElementById('login-overlay').className = 'overlay';
}

document.getElementById('login-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeLogin();
});

function doLogin() {
  var username = (document.getElementById('login-username').value || '').trim();
  var password = (document.getElementById('login-password').value || '').trim();
  var errEl = document.getElementById('login-error');
  var btn   = document.getElementById('login-btn');

  errEl.className = 'login-error';
  if (!username || !password) {
    errEl.textContent = 'Please enter your username and password.';
    errEl.className = 'login-error show'; return;
  }

  btn.disabled = true;
  btn.textContent = 'Signing in…';

  var wakeTimer = setTimeout(function(){
    if (btn.disabled) btn.textContent = 'Waking up server… (30s)';
  }, 4000);

  fetch('/api/login', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({username:username, password:password})
  })
  .then(function(r){ return r.json(); })
  .then(function(d) {
    clearTimeout(wakeTimer);
    btn.disabled = false;
    btn.textContent = 'Sign In →';
    if (d.ok) {
      var m = DEPT_META[_dept];
      if (m.roles.indexOf(d.role) === -1) {
        var correctDept = (d.role === 'planner' || d.role === 'tower') ? 'Route Planning' : 'Client Onboarding';
        errEl.textContent = 'This account belongs to the ' + correctDept + ' department. Please go back and select the correct system.';
        errEl.className = 'login-error show';
        document.getElementById('login-password').value = '';
        return;
      }
      window.location.href = m.dest;
    } else {
      errEl.textContent = d.error || 'Invalid username or password.';
      errEl.className = 'login-error show';
      document.getElementById('login-password').value = '';
      document.getElementById('login-password').focus();
    }
  })
  .catch(function() {
    clearTimeout(wakeTimer);
    btn.disabled = false;
    btn.textContent = 'Sign In →';
    errEl.textContent = 'Connection error — server may be starting up. Wait 30 seconds and try again.';
    errEl.className = 'login-error show';
  });
}

// Auto-redirect if already logged in
fetch('/api/me').then(function(r){ return r.json(); }).then(function(d) {
  if (d.authenticated) {
    var role = d.role;
    if (role === 'planner' || role === 'tower') { window.location.href = '/routing'; return; }
    if (role === 'sales' || role === 'accounting' || role === 'supervisor') { window.location.href = '/onboarding'; return; }
  }
}).catch(function(){});
</script>
</body>
</html>
